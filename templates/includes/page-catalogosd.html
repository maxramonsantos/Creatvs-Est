<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Software - Creatvs Est</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
    
<body class="p-5">
    <div class="container fundo-hero-loja text-center text-white">
        <a href="/" class="btn btn-primary mt-3 mb-5">Voltar para a Home</a>
        <h1 class="text-uppercase  mb-3">Encontre empresas,                        profissionais e serviços
        </h1>
    </div>

    
    <div class="container"> 
        <div class="row">
            <div class="col-12 text-center pt-5">
                <h2>Catálogo de Serviços</h2>
                <p>
                    {% for categoria in categorias%}
                        <div>
                            <h4 style="color:red; margin-botton: 5px;">
                                {{ categoria.nome}}
                            </h4>
                        </div>
                    {% endfor %}
                </p>
            </div>
        </div>
    </div>




    
</body>
</html>
